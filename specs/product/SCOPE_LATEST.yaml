prior_art:
  researched_at: "2026-07-24"
  status: complete
  next_skill: plan-release
  candidates:
    - name: OrbitRelay AuthKind + profiles + keyring
      source: src/orbitrelay/profiles.py, credentials.py, cli.py
      verdict: extend
      notes: >-
        EXTERNAL_FIRST_PARTY_CLI already modeled and non-secret; only API_KEY is
        executable today (cli.py rejects other kinds). CredentialStore is the
        only secret persistence path. SuperGrok tokens should extend this
        contract rather than invent plaintext files.
    - name: OrbitRelay Chat Completions agent loop
      source: src/orbitrelay/agent.py + openai 2.46.0
      verdict: extend
      notes: >-
        BYOK xAI can reuse client.chat.completions.create against
        https://api.x.ai/v1. SuperGrok may require Responses-style transport
        (Hermes/Pi evidence); plan-work must choose chat.completions-with-bearer
        vs Responses adapter without changing local tool/approval contracts.
    - name: Official Codex CLI process boundary
      source: https://developers.openai.com/codex/auth/ ; https://developers.openai.com/codex/noninteractive/ ; https://developers.openai.com/codex/cli/reference/
      verdict: extend
      notes: >-
        Documented stable commands: `codex login` (browser default;
        `--device-auth`; `--with-api-key` stdin; `--with-access-token` stdin;
        `codex login status` exit 0 when credentials present), `codex logout`,
        `codex exec`/`codex e` with `--json` JSONL events, `--output-last-message/-o`,
        `--cd/-C`, sandbox/approval flags. Never read auth.json. No hard minimum
        version published in these pages — detect+warn policy stands. Local
        machine currently has no `codex` on PATH.
    - name: xAI BYOK OpenAI-compatible API
      source: https://docs.x.ai/developers/quickstart ; https://docs.x.ai/developers/models/grok-4.5 ; https://docs.x.ai/developers/grok-4-5
      verdict: extend
      notes: >-
        Env `XAI_API_KEY`; base URL `https://api.x.ai/v1`; Bearer auth; model id
        `grok-4.5` supports function calling and both Chat Completions and
        Responses. Official OpenAI Python SDK pattern is already OrbitRelay's
        stack. Default model pin: grok-4.5.
    - name: Hermes xai-oauth SuperGrok flow
      source: https://hermes-agent.nousresearch.com/docs/guides/xai-grok-oauth ; https://x.ai/news/grok-hermes
      verdict: compose
      notes: >-
        Official xAI endorsement of SuperGrok OAuth inside Hermes. Device-code
        against auth.x.ai / accounts.x.ai; inference base https://api.x.ai/v1;
        transport described as Responses API; documents HTTP 403 tier gating and
        API-key fallback. Do not adopt Hermes package (different product); reuse
        the documented flow shape and failure modes.
    - name: pi-xai-oauth / Grok CLI OAuth constants
      source: https://pi.dev/packages/pi-xai-oauth ; https://github.com/BlockedPath/pi-xai-oauth/blob/main/extensions/xai/constants.ts
      verdict: compose
      notes: >-
        Pins first-party OAuth endpoints used by Grok CLI clients: issuer
        https://auth.x.ai; authorize/device/token/jwks under /oauth2 and
        .well-known; client_id b1a00492-073a-47ea-816f-4c329264a828; scopes
        include openid profile email offline_access grok-cli:access api:access
        conversations:read conversations:write; device grant
        urn:ietf:params:oauth:grant-type:device_code; PKCE S256 for browser.
        OAuth session proxy https://cli-chat-proxy.grok.com/v1 vs API-key
        https://api.x.ai/v1. Do not vendor the JS package; port only the
        security-relevant protocol pins after ToS/identity review in plan-work.
        OrbitRelay must not read ~/.grok/auth.json even though Pi optionally does.
    - name: npm/openai or xai-sdk as new deps
      source: pyproject.toml / PyPI
      verdict: adopt
      notes: >-
        Keep existing openai package for BYOK Chat Completions. Do not add
        xai-sdk unless Responses gRPC path becomes mandatory; prefer REST via
        openai or stdlib HTTP for OAuth token exchange.

  pinned_contracts:
    codex:
      detect: which/PATH lookup for `codex`
      version: `codex --version` (warn-only floor TBD if release notes later publish one)
      login_browser: `codex login`
      login_device: `codex login --device-auth`
      login_status: `codex login status` (exit 0 => credentials present)
      logout: `codex logout`
      exec: `codex exec --json --cd <workspace> <prompt>`
      exec_final_message: `codex exec -o <path> ...`
      never: read CODEX_HOME/auth.json; reproduce ChatGPT OAuth inside OrbitRelay
    xai_byok:
      env: XAI_API_KEY
      base_url: https://api.x.ai/v1
      default_model: grok-4.5
      auth_header: "Authorization: Bearer <api_key>"
      loop: existing chat.completions tool loop
    xai_supergrok_oauth:
      issuer: https://auth.x.ai
      accounts_origin: https://accounts.x.ai
      discovery: https://auth.x.ai/.well-known/openid-configuration
      authorize: https://auth.x.ai/oauth2/authorize
      device_code: https://auth.x.ai/oauth2/device/code
      token: https://auth.x.ai/oauth2/token
      jwks: https://auth.x.ai/.well-known/jwks.json
      device_grant_type: urn:ietf:params:oauth:grant-type:device_code
      client_id_candidate: b1a00492-073a-47ea-816f-4c329264a828
      scope_candidate: >-
        openid profile email offline_access grok-cli:access api:access
        conversations:read conversations:write
      api_base: https://api.x.ai/v1
      session_proxy_candidate: https://cli-chat-proxy.grok.com/v1
      default_model_candidate: grok-4.5
      known_failure: HTTP 403 entitlement gating after successful login
      storage: OrbitRelay OS keyring only; never ~/.grok/auth.json or plaintext files
      open_design_questions:
        - >-
          Prefer device-code first (headless-friendly, matches Hermes) with
          optional browser+PKCE second, or browser-first like Pi desktop?
        - >-
          Inference transport for OAuth: try Chat Completions bearer on api.x.ai
          first to reuse agent.py, or implement Responses (+ optional
          cli-chat-proxy) if Completions rejects subscription tokens.
        - >-
          Whether OrbitRelay should use the Grok CLI public client_id or obtain
          a distinct registered client if/when xAI offers one; using the shared
          Grok CLI client_id must be explicitly accepted as consumer-session
          compatibility, not as OrbitRelay-owned OAuth app registration.

  outcome_summary: >-
    Build OrbitRelay-owned Codex subprocess bridge and xAI dual auth (BYOK +
    SuperGrok OAuth) by extending existing profiles/credentials/agent seams.
    Compose protocol knowledge from Codex docs, Hermes, and pi-xai-oauth without
    adopting those codebases or reading foreign auth files.
