initiative: supported-hosted-access
roadmap_priority: P3
status: scoped
target_version: "0.4.0"
codename: Supported Hosted Access
predecessor: tool-approval-policies (P2, released as 0.3.0)

core_value: >-
  Let users reach supported hosted providers through documented boundaries—
  official Codex CLI process integration, xAI API-key (BYOK) profiles, and
  SuperGrok / X Premium subscription OAuth—without inventing unsupported
  password collection, without reading foreign auth files, and without
  weakening existing credential or tool-approval guarantees.

summary: >-
  P3 makes OrbitRelay usable with the hosted providers users already pay for.
  Codex ChatGPT-backed access is integrated only as an alternate runtime path
  that detects a separately installed official `codex` executable, delegates
  login/logout to documented Codex commands, and invokes documented
  noninteractive `codex exec`—never by reading `CODEX_HOME/auth.json` or
  reproducing Codex OAuth. Codex is not forced through the existing OpenAI
  Chat Completions tool loop.

  xAI is dual-path. BYOK remains first-class: named `api_key` profiles (and an
  `XAI_API_KEY` migration path) against the public OpenAI-compatible endpoint
  `https://api.x.ai/v1`, with secrets only in the native OS keyring. Separately,
  SuperGrok / X Premium subscription access is first-class OAuth against the
  xAI account auth surface used by Hermes and Pi (accounts.x.ai / auth.x.ai
  device-code and/or browser+PKCE). Subscription OAuth tokens are stored only
  through OrbitRelay’s existing credential contract—not plaintext auth.json—
  and power the existing local agent loop and tool-approval policies. API-key
  billing and subscription entitlement are documented as distinct tracks;
  tier/403 entitlement failures fail closed with clear recovery guidance.

  P1 already models `AuthKind.EXTERNAL_FIRST_PARTY_CLI` and only executes
  `AuthKind.API_KEY` today. P3 connects those contracts carefully, adds the
  subscription OAuth path required for SuperGrok usage, preserves P2 batch-first
  approvals for local tools on every provider path that still uses OrbitRelay
  tools, and proves behavior with offline fakes (subprocess, OAuth, HTTP).

locked_decisions:
  - id: ship_shape
    decision: >-
      0.4.0 ships both Codex CLI bridge and xAI hosted access (BYOK + SuperGrok
      OAuth) in one release epic; stories may still be sequenced inside the epic.
  - id: codex_runtime
    decision: >-
      Codex uses an alternate runtime path that shells out to documented Codex
      CLI commands (`login`/`logout`/`exec` and version/status). It is not
      presented as another Chat Completions provider feeding the current loop.
  - id: codex_packaging
    decision: >-
      Document install only. Do not vendor or depend on `codex` as a Python
      package. Detect PATH setup; fail with clear install guidance if missing.
  - id: codex_version_policy
    decision: >-
      Detect and report Codex version. Warn when below a researched documented
      floor if one is known; do not hard-block unknown newer formats. Official
      CLI owns auth, refresh, storage, logout, and licensing wording.
  - id: xai_byok
    decision: >-
      First-class xAI API-key profiles via secure credential entry and
      `XAI_API_KEY` env migration. Default base URL `https://api.x.ai/v1`.
      Default model `grok-4.5` (official xAI docs, 2026-07-17). Uses existing
      `api_key` auth + keyring and the existing Chat Completions agent loop.
  - id: xai_supergrok_oauth
    decision: >-
      First-class SuperGrok / X Premium subscription OAuth is in P3 scope.
      Evidence: official xAI Hermes announcement (x.ai/news/grok-hermes),
      Hermes `xai-oauth` device-code flow against accounts.x.ai/auth.x.ai, and
      Pi `pi-xai-oauth` browser+PKCE / device flows plus Grok CLI session proxy
      usage. OrbitRelay must not collect passwords, must not read
      `~/.grok/auth.json` / Hermes auth files, and must store tokens only via
      the native OS credential contract. Document that API keys do not draw
      SuperGrok subscription usage, and that some tiers may return HTTP 403 on
      OAuth inference despite successful browser login.
  - id: approvals_invariant
    decision: >-
      P2 approval policies, workspace confinement, and secret-free audit remain
      enforced for OrbitRelay local tools on every path that still executes those
      tools. Codex alternate-path tool side effects, if any, are governed by
      Codex itself and must not bypass OrbitRelay’s local sandbox claims.

in_scope:
  - id: e03s01
    outcome: >-
      Users can create, select, inspect, and delete an xAI BYOK profile (or use
      `XAI_API_KEY` migration) and run the existing Chat Completions agent loop
      against xAI’s public API endpoint with keyring-backed secrets only.
  - id: e03s02
    outcome: >-
      Users can complete SuperGrok / X Premium OAuth login (device-code and/or
      browser+PKCE against documented xAI account auth endpoints), refresh
      tokens, inspect auth status, and log out without OrbitRelay reading
      foreign auth files or writing plaintext token files.
  - id: e03s03
    outcome: >-
      A SuperGrok OAuth session can drive OrbitRelay’s existing agent loop and
      local tools under current approval policies, with clear failure modes for
      missing login, expired/revoked refresh, and entitlement/403 responses.
  - id: e03s04
    outcome: >-
      Users can detect a separately installed official `codex` executable,
      report availability/version separately from model API profiles, and
      receive install guidance when Codex is missing.
  - id: e03s05
    outcome: >-
      Users can delegate Codex interactive login and logout to documented Codex
      CLI commands without OrbitRelay reproducing OAuth or reading
      `CODEX_HOME/auth.json`.
  - id: e03s06
    outcome: >-
      Users can run a noninteractive Codex-backed task through the documented
      `codex exec` boundary as an alternate runtime path, with version warnings
      per the detect-and-warn policy and without claiming Chat Completions
      protocol equivalence.
  - id: e03s07
    outcome: >-
      Offline tests and user docs cover BYOK, SuperGrok OAuth, and Codex bridge
      setup/failure modes; `./scripts/check.sh` remains the mechanical gate; no
      real network, real keyring backends, or real auth files are required in CI.

out_of_scope:
  - item: Reading or copying CODEX_HOME/auth.json, ~/.grok/auth.json, Hermes auth.json, browser cookies, or other foreign session stores
    reason: >-
      Locked security boundary. Official CLIs own their on-disk auth; OrbitRelay
      uses process boundaries or its own credential contract only.
  - item: Collecting provider passwords or scraping undocumented browser session state
    reason: >-
      Forbidden. Only documented device-code / browser OAuth or API-key entry.
  - item: Claiming a stable third-party xAI developer OAuth client-registration program beyond the consumer SuperGrok/X Premium account flow
    reason: >-
      Public developer API docs remain API-key oriented; SuperGrok OAuth is
      scoped as subscription session auth endorsed for agents (Hermes), not as
      inventing a private app-registration console.
  - item: Impersonating the official Grok CLI client identity or silently reusing its private wire-protocol headers beyond what research pins as necessary and disclosed
    reason: >-
      Prefer truthful OrbitRelay identity, documented endpoints, and fail-closed
      behavior when contracts change.
  - item: Bundling or auto-installing the Codex binary
    reason: >-
      Packaging decision is document-install only.
  - item: Forcing Codex through the existing Chat Completions tool loop
    reason: >-
      Product decision: alternate runtime path only in P3.
  - item: Conversation persistence, streaming UX, or session retention defaults
    reason: Deferred to P4.
  - item: Ollama/vLLM local-model certification
    reason: Deferred to P5.
  - item: Plugin systems and third-party tool trust
    reason: Deferred to P6.
  - item: Windows certification and CI introduction
    reason: Deferred to P7 unless the user expands scope.
  - item: TTS, image/video generation, or other non-chat xAI surfaces
    reason: >-
      Out of P3 agent-loop scope; subscription token reuse for media APIs can be
      reconsidered later once chat OAuth is stable.

constraints:
  product:
    - API-key xAI use must not be blocked while SuperGrok OAuth is unavailable or entitlement-gated.
    - SuperGrok OAuth and API-key paths must be labeled as distinct billing/entitlement tracks in user-facing docs.
    - Codex availability/version is reported separately from OpenAI-compatible model profiles.
    - Missing Codex, missing login, timeout, denial, and 403 entitlement failures fail closed with actionable messages.
    - Local tool approvals remain batch-first and fail-closed on every OrbitRelay tool path.
  security:
    - Native OS credential store only for OrbitRelay-managed secrets and OAuth tokens; no plaintext secret files.
    - Never read or copy foreign auth.json / cookie stores.
    - Never log access tokens, refresh tokens, authorization codes, or API keys.
    - OAuth redirect/device flows must bind state/PKCE (or equivalent documented device-code security) and reject unbound codes.
    - Workspace path/symlink confinement and approval deny-by-default remain mandatory for local tools.
  technical:
    - Preserve installable `orbitrelay` and `python -m orbitrelay` entry points.
    - Preserve existing generic OpenAI-compatible configuration.
    - Connect `AuthKind.EXTERNAL_FIRST_PARTY_CLI` for Codex rather than inventing a parallel auth taxonomy.
    - SuperGrok OAuth may introduce a dedicated auth kind or profile metadata only if it fits the existing profile model without weakening validation.
    - Keep tests offline with fake subprocess, fake OAuth endpoints, and temp profile homes.
    - Preserve Python 3.14 as the currently declared minimum and macOS/Linux as currently verified developer platforms.
  delivery:
    - Research-first has pinned Codex command surface, xAI BYOK defaults, and SuperGrok OAuth endpoint candidates (see prior_art). Module boundaries remain plan-work.
    - No implementation begins until e03 stories are sliced and the hosted-access threat model is reviewed.
    - Re-verify OAuth client identity and inference endpoint choice before coding if upstream contracts change.

success_criteria:
  - An xAI BYOK profile (or `XAI_API_KEY` path) can complete a fake-HTTP offline agent run against xAI defaults without secret leakage in metadata or logs.
  - SuperGrok OAuth login can complete against a fake auth server, persist tokens only via the credential contract, refresh, report status, and log out.
  - A SuperGrok-authenticated profile can drive the existing agent loop with local tools under confirm/read-only/pre-approved policies in offline tests.
  - Entitlement/401/403 and missing-login failures return clear errors and produce no local side effects before approval.
  - Codex missing/present/version detection works offline with a fake executable and never touches auth.json.
  - Codex login/logout delegation invokes only documented command boundaries in tests.
  - Codex exec alternate path runs a scripted noninteractive success and failure path without claiming Chat Completions equivalence.
  - Docs explain install/login for Codex, BYOK vs SuperGrok billing distinction, and recovery for tier/403 cases.
  - Existing profile, approval, sandbox, package-build, and isolated-wheel checks continue to pass.
  - ./scripts/check.sh passes after implementation.

research_evidence:
  - title: xAI official Hermes SuperGrok announcement
    url: https://x.ai/news/grok-hermes
    note: >-
      xAI publicly states users can use a Grok subscription inside Hermes Agent
      via OAuth and points to Hermes setup docs; available on every tier per
      announcement copy.
  - title: Hermes xAI Grok OAuth guide
    url: https://hermes-agent.nousresearch.com/docs/guides/xai-grok-oauth
    note: >-
      Device-code OAuth against accounts.x.ai/auth.x.ai; no XAI_API_KEY; tokens
      refreshed; documents HTTP 403 tier gating on OAuth API surface and API-key
      fallback.
  - title: Pi pi-xai-oauth package
    url: https://pi.dev/packages/pi-xai-oauth
    note: >-
      Browser+PKCE and device OAuth; OAuth session traffic via
      cli-chat-proxy.grok.com; API-key traffic via api.x.ai; reuses official Grok
      CLI credentials optionally; labels subscription usage lookup as unofficial.
  - title: xAI API authentication / chat surfaces
    url: https://docs.x.ai/docs/api-reference#authentication
    note: >-
      Public developer API remains the OpenAI-compatible api.x.ai surface used
      for BYOK; subscription OAuth is a distinct consumer/session path.
  - title: Codex auth and noninteractive docs
    urls:
      - https://developers.openai.com/codex/auth/
      - https://developers.openai.com/codex/noninteractive/
    note: >-
      Codex owns login/refresh/storage/logout; OrbitRelay may invoke documented
      commands only.

