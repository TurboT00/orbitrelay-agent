initiative: supported-hosted-access
roadmap_priority: P3
status: handoff-ready
predecessor: tool-approval-policies (P2, released as 0.3.0)

core_value: >-
  Let users reach supported hosted providers through documented auth boundaries—
  official Codex CLI process integration and xAI API-key profiles—without
  inventing OAuth or weakening existing credential and tool-approval guarantees.

summary: >-
  P3 has not been scoped into vertical stories yet. The next agent must run
  discover/scope work before implementation. Target capabilities are:
  (1) detect and use a separately installed official Codex CLI for documented
  login/logout/noninteractive execution without reading auth.json; and
  (2) support xAI/Grok bring-your-own-key profiles while keeping generic
  OpenAI-compatible configuration available.

  P1 already models AuthKind.EXTERNAL_FIRST_PARTY_CLI but only AuthKind.API_KEY
  is executable. P2 approval policies must remain enforced for local tools no
  matter which provider path is selected.

in_scope_direction:
  - Codex CLI detection, version reporting, and documented command boundaries
  - Codex login/logout delegation to the official CLI
  - Noninteractive Codex exec integration appropriate to OrbitRelay's agent UX
  - xAI API-key profile preset and credential entry via existing keyring path
  - Tests that fake subprocess/CLI and avoid real network or real auth files
  - Documentation of supported setup and explicit non-support for invented OAuth

out_of_scope_direction:
  - Reading or copying CODEX_HOME/auth.json or browser session state
  - Homegrown OAuth/device-code flows for Codex or xAI
  - Conversation persistence, streaming, or session retention (P4)
  - Ollama/vLLM local-model certification (P5)
  - Plugin systems (P6)
  - Windows certification and CI introduction unless user expands scope (P7)

open_questions:
  - Codex minimum version and subscription-use wording
  - Whether Codex bridge and xAI BYOK ship as one release or sequenced stories
  - How Codex execution composes with the current Chat Completions tool loop
  - Default xAI base URL/model and env var naming

entry_skill: survey-context
next_skill_after_survey: scope-work
handoff_doc: specs/HANDOFF_LATEST.md
baseline_release: v0.3.0
