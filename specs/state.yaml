decisions:
  credential_store: Use the native OS credential store behind a replaceable contract; never fall back to plaintext secrets.
  profile_metadata: Store named profile metadata per-user only in P1; do not write profiles into repositories.
  p1_auth_breadth: Model and validate all four roadmap auth kinds, but connect only api_key profiles to the runtime in P1.
  codex_auth: Use the official Codex CLI as a process boundary; never reproduce its OAuth flow or read auth.json.
  grok_auth: Support xAI BYOK and monitor official documentation for third-party OAuth.
  next_user_capability: After approvals, add supported hosted access (Codex CLI bridge + xAI BYOK).
  local_models: Start with Ollama loopback after capability profiles, approvals, and hosted-access foundations exist.
  remote_push: Do not push without an explicit user request.
  approval_batching: Validate and authorize the full model tool-call batch before executing approved calls in original order.
  approval_timeout: Default interactive decisions to 60 seconds, allow an explicit CLI override, and deny on timeout.
  approval_preapproved: Require a per-tool allowlist for pre-approved automation; never infer blanket approval.
  approval_audit: Keep decision records run-local and emit sanitized events to stderr only in verbose mode.
  p2_status: Completed and released as 0.3.0.
preferences:
  - Ask before making product, auth, security, persistence, or platform-support assumptions.
  - Prefer verification over inference when intent is ambiguous.
  - Keep GitHub optional until cross-machine development makes CI valuable.
  - Start P3 from discover/scope, not from implementation commits.
