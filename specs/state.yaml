decisions:
  credential_store: Use the native OS credential store behind a replaceable contract; never fall back to plaintext secrets.
  profile_metadata: Store named profile metadata per-user only in P1; do not write profiles into repositories.
  p1_auth_breadth: Model and validate all four roadmap auth kinds, but connect only api_key profiles to the runtime in P1.
  codex_auth: Use the official Codex CLI as a process boundary; never reproduce its OAuth flow or read auth.json.
  grok_auth: >-
    Support xAI BYOK and first-class SuperGrok/X Premium subscription OAuth
    (device-code and/or browser+PKCE). Never read foreign auth.json; store
    tokens only in the native OS credential contract. API-key billing and
    subscription entitlement are distinct tracks.
  p3_ship_shape: Ship Codex CLI bridge and xAI (BYOK + SuperGrok OAuth) together in 0.4.0.
  p3_codex_runtime: Codex is an alternate runtime path via documented CLI commands, not Chat Completions.
  p3_codex_packaging: Document install only; detect PATH; no vendored codex binary.
  p3_codex_version_policy: Detect and report version; warn below researched floor; do not hard-block unknowns.
  p3_xai_byok_defaults: XAI_API_KEY + https://api.x.ai/v1 + model grok-4.5.
  p3_codex_commands: >-
    codex login [--device-auth]; codex login status; codex logout;
    codex exec --json --cd <workspace> [ -o path ] <prompt>.
  p3_supergrok_oauth_pins: >-
    auth.x.ai device/authorize/token; client_id candidate from Grok CLI
    compatibility surface; store tokens only in OS keyring; 403 entitlement
    fail-closed with BYOK fallback guidance.
  p3_supergrok_login_ux: device-code-first; optional browser+PKCE second
  p3_supergrok_inference_transport: >-
    Prefer Chat Completions bearer on https://api.x.ai/v1 to reuse agent.py;
    fall back to Responses/cli-chat-proxy only if Completions rejects subscription tokens.
  p3_supergrok_oauth_client: >-
    Accept shared Grok CLI OAuth client_id as consumer-session compatibility
    (not OrbitRelay-owned app registration); document truthfully.
  next_user_capability: Supported hosted access — Codex CLI bridge + xAI BYOK + SuperGrok OAuth.
  local_models: Start with Ollama loopback after capability profiles, approvals, and hosted-access foundations exist.
  remote_push: Do not push without an explicit user request.
  approval_batching: Validate and authorize the full model tool-call batch before executing approved calls in original order.
  approval_timeout: Default interactive decisions to 60 seconds, allow an explicit CLI override, and deny on timeout.
  approval_preapproved: Require a per-tool allowlist for pre-approved automation; never infer blanket approval.
  approval_audit: Keep decision records run-local and emit sanitized events to stderr only in verbose mode.
  p2_status: Completed and released as 0.3.0.
  p3_status: Completed and released as 0.4.0.
preferences:
  - Ask before making product, auth, security, persistence, or platform-support assumptions.
  - Prefer verification over inference when intent is ambiguous.
  - Keep GitHub optional until cross-machine development makes CI valuable.
  - Start P3 from discover/scope, not from implementation commits.
